<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact | Kessa Integrated Solution</title>

<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Roboto', sans-serif;
}

body{
background:#fff;
color:#333;
}

/* NAVBAR */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 80px;
background:white;
box-shadow:0 3px 12px rgba(0,0,0,0.08);
}

.logo img{
height:60px;
}

nav a{
margin-left:35px;
text-decoration:none;
color:#333;
}

/* CONTACT */

.section{
padding:90px 120px;
}

.section-title{
text-align:center;
font-size:36px;
margin-bottom:40px;
}

.contact-form{
max-width:500px;
margin:auto;
display:flex;
flex-direction:column;
gap:16px;
}

.contact-form input,
.contact-form textarea{
padding:14px;
border:1px solid #ddd;
border-radius:5px;
font-size:15px;
}

.contact-form textarea{
min-height:120px;
}

.contact-form button{
background:#e60000;
color:white;
border:none;
padding:15px;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

footer{
background:#111;
color:white;
padding:35px;
text-align:center;
}

@media(max-width:768px){

header{
flex-direction:column;
align-items:flex-start;
padding:20px;
}

.section{
padding:60px 25px;
}

}

</style>

</head>

<body>

<header>

<div class="logo">
<img src="logo.png">
</div>

<nav>
<a href="index.html">Home</a>
<a href="products.html">Products</a>
<a href="services.html">Services</a>
<a href="rental.html">Rental</a>
<a href="contact.html">Contact</a>
</nav>

</header>


<section class="section">

<h2 class="section-title">Contact Us</h2>

<form action="https://formspree.io/f/xjgavnly" method="POST" class="contact-form">

<input type="text" name="name" placeholder="Your Name" required>

<input type="email" name="email" placeholder="Your Email" required>

<input type="tel" name="phone" placeholder="Phone Number">

<textarea name="message" placeholder="Your Message"></textarea>

<button type="submit">Send Message</button>

</form>

</section>

<footer>

© 2026 Kessa Integrated Solution  
| Registration No: 202603054901 (003828573-D)

</footer>

</body>

</html>
